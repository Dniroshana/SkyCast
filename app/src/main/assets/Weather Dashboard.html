<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SkyCast - Modern Weather</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#100563",
                        "tertiary-container": "#d88a00",
                        "outline-variant": "#bec8d2",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#4a2c00",
                        "secondary": "#5654a8",
                        "tertiary": "#855300",
                        "surface-container-high": "#e6e8ea",
                        "outline": "#6e7881",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e0e3e5",
                        "primary-fixed-dim": "#89ceff",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#eff1f3",
                        "surface": "#f7f9fb",
                        "primary-fixed": "#c9e6ff",
                        "on-secondary-container": "#393689",
                        "background": "#f7f9fb",
                        "on-primary-fixed": "#001e2f",
                        "on-primary-container": "#003751",
                        "error-container": "#ffdad6",
                        "primary": "#006591",
                        "on-background": "#191c1e",
                        "on-secondary-fixed-variant": "#3e3c8f",
                        "surface-dim": "#d8dadc",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#c3c0ff",
                        "surface-container-highest": "#e0e3e5",
                        "inverse-surface": "#2d3133",
                        "on-surface-variant": "#3e4850",
                        "primary-container": "#0ea5e9",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eceef0",
                        "tertiary-fixed": "#ffddb8",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-surface": "#191c1e",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "inverse-primary": "#89ceff",
                        "surface-container-low": "#f2f4f6",
                        "secondary-fixed": "#e2dfff",
                        "on-primary-fixed-variant": "#004c6e",
                        "on-tertiary-fixed": "#2a1700",
                        "secondary-container": "#a7a5ff",
                        "surface-tint": "#006591"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": [
                            "Plus Jakarta Sans",
                            "sans-serif"
                        ],
                        "body": [
                            "Inter",
                            "sans-serif"
                        ],
                        "label": [
                            "Inter",
                            "sans-serif"
                        ]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #006591 0%, #0ea5e9 40%, #f7f9fb 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-card {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .glass-nav {
            background-color: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-on-surface antialiased overflow-x-hidden pb-32 pt-20">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-6 h-16 bg-white/60 dark:bg-slate-900/60 backdrop-blur-2xl shadow-[0_8px_32px_0_rgba(14,165,233,0.05)] justify-between">
    <div class="flex items-center gap-4">
        <button onclick="Android.onMenuClicked()" class="text-primary hover:bg-sky-50/50 dark:hover:bg-sky-900/20 transition-colors p-2 rounded-full flex items-center justify-center">
            <span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">menu</span>
        </button>
        <span class="font-headline text-lg font-semibold tracking-tight text-sky-600 dark:text-sky-400">SkyCast</span>
    </div>

</header>
<main class="max-w-md mx-auto px-6 flex flex-col gap-8 relative z-10">
    <!-- Search Bar -->
    <div class="relative w-full group mt-4">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-outline-variant" style="font-variation-settings: 'wght' 300;">search</span>
        </div>
        <input id="cityInput" onkeypress="if(event.key === 'Enter') handleSearch()" class="w-full bg-surface-container-high rounded-full py-4 pl-12 pr-6 text-body-lg text-on-surface placeholder:text-outline-variant border border-transparent focus:bg-surface-container-lowest focus:border-outline-variant/15 focus:ring-0 transition-all duration-300 outline-none shadow-sm hover:shadow-md font-body" placeholder="Search for a city or airport" type="text"/>
    </div>
    <!-- Main Weather Card -->
    <article class="glass-card rounded-xl p-8 flex flex-col items-center justify-center text-center shadow-[0_16px_48px_rgba(0,101,145,0.06)] relative overflow-hidden">
        <div class="absolute top-[-20%] right-[-10%] w-64 h-64 bg-primary-fixed-dim/30 rounded-full blur-[64px] pointer-events-none"></div>
        <h2 id="cityName" class="font-headline text-2xl font-bold text-on-surface tracking-tight z-10 relative">Loading...</h2>
        <p id="dateTime" class="font-body text-sm text-on-surface-variant mt-1 z-10 relative">Detecting location...</p>
        <div class="flex items-center justify-center mt-6 z-10 relative">
            <span id="weatherIcon" class="material-symbols-outlined text-[100px] text-tertiary-container" style="font-variation-settings: 'FILL' 1, 'wght' 200;">cloud_sync</span>
        </div>
        <div class="mt-4 flex flex-col items-center z-10 relative">
            <span id="temperature" class="font-headline text-[88px] font-bold leading-none tracking-tighter text-primary">--°</span>
            <span id="condition" class="font-headline text-xl font-semibold text-on-surface-variant mt-2">Please wait</span>
        </div>
        <div class="flex justify-center gap-8 w-full mt-10 pt-6 border-t border-outline-variant/15 z-10 relative">
            <div class="flex flex-col items-center">
                <span class="material-symbols-outlined text-outline mb-1 text-[20px]" style="font-variation-settings: 'wght' 300;">air</span>
                <span class="font-body text-xs text-outline font-medium">WIND</span>
                <span id="windSpeed" class="font-headline text-sm font-semibold text-on-surface mt-0.5">-- km/h</span>
            </div>
            <div class="flex flex-col items-center">
                <span class="material-symbols-outlined text-outline mb-1 text-[20px]" style="font-variation-settings: 'wght' 300;">water_drop</span>
                <span class="font-body text-xs text-outline font-medium">HUMIDITY</span>
                <span id="humidity" class="font-headline text-sm font-semibold text-on-surface mt-0.5">--%</span>
            </div>
            <div class="flex flex-col items-center">
                <span class="material-symbols-outlined text-outline mb-1 text-[20px]" style="font-variation-settings: 'wght' 300;">visibility</span>
                <span class="font-body text-xs text-outline font-medium">VISIBILITY</span>
                <span id="visibility" class="font-headline text-sm font-semibold text-on-surface mt-0.5">-- km</span>
            </div>
        </div>
    </article>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-3 pb-8 bg-white/70 dark:bg-slate-950/70 backdrop-blur-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.04)] rounded-t-[2rem]">
    <a class="flex flex-col items-center justify-center bg-sky-500 dark:bg-sky-400 text-white dark:text-slate-950 rounded-2xl px-5 py-2 scale-110 shadow-lg shadow-sky-500/20" href="#">
        <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1, 'wght' 400;">filter_drama</span>
        <span class="font-plus-jakarta-sans text-[11px] font-bold uppercase tracking-widest">Today</span>
    </a>
    <a onclick="Android.onForecastClicked()" class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-sky-400 dark:hover:text-sky-300 transition-all" href="javascript:void(0)">
        <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'wght' 300;">calendar_month</span>
        <span class="font-plus-jakarta-sans text-[11px] font-bold uppercase tracking-widest">Forecast</span>
    </a>
    <a onclick="Android.onRadarClicked()" class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-sky-400 dark:hover:text-sky-300 transition-all" href="javascript:void(0)">
        <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'wght' 300;">explore</span>
        <span class="font-plus-jakarta-sans text-[11px] font-bold uppercase tracking-widest">Radar</span>
    </a>
    <a onclick="Android.onSettingsClicked()" class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-sky-400 dark:hover:text-sky-300 transition-all" href="javascript:void(0)">
        <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'wght' 300;">settings</span>
        <span class="font-plus-jakarta-sans text-[11px] font-bold uppercase tracking-widest">Settings</span>
    </a>
</nav>

<script>
    function handleSearch() {
        const city = document.getElementById('cityInput').value;
        if (city && typeof Android !== 'undefined') {
            Android.searchCity(city);
        }
    }

    function updateWeather(data) {
        document.getElementById('cityName').innerText = data.city;
        document.getElementById('temperature').innerText = data.temp + '°';
        document.getElementById('condition').innerText = data.condition;
        document.getElementById('windSpeed').innerText = data.windSpeed + ' km/h';
        document.getElementById('humidity').innerText = data.humidity + '%';
        document.getElementById('visibility').innerText = data.visibility + ' km';

        // Update date/time
        const now = new Date();
        const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('dateTime').innerText = 'Today, ' + timeString;

        // Map OpenWeatherMap icon code to Material Symbols
        const iconMap = {
            '01d': 'sunny',
            '01n': 'nightlight',
            '02d': 'partly_cloudy_day',
            '02n': 'partly_cloudy_night',
            '03d': 'cloud',
            '03n': 'cloud',
            '04d': 'cloudy',
            '04n': 'cloudy',
            '09d': 'rainy',
            '09n': 'rainy',
            '10d': 'rainy',
            '10n': 'rainy',
            '11d': 'thunderstorm',
            '11n': 'thunderstorm',
            '13d': 'snowing',
            '13n': 'snowing',
            '50d': 'mist',
            '50n': 'mist'
        };

        const symbol = iconMap[data.icon] || 'cloud';
        document.getElementById('weatherIcon').innerText = symbol;
    }

    // Call Android to request permission if needed when page loads
    window.onload = function() {
        if (typeof Android !== 'undefined' && Android.requestLocationPermission) {
            Android.requestLocationPermission();
        }
    };
</script>
</body></html>
