<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SkyCast - Sign In</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#006591", "primary-container": "#0ea5e9", "on-primary": "#ffffff",
                      "surface": "#f7f9fb", "on-surface": "#191c1e", "on-surface-variant": "#3e4850",
                      "outline": "#6e7881", "background": "#f7f9fb"
              },
              "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px" },
              "fontFamily": { "headline": ["Plus Jakarta Sans"], "body": ["Inter"] }
            }
          }
        }
    </script>
    <style>
        .glass-surface { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<div class="fixed inset-0 z-0 bg-gradient-to-b from-primary to-white"></div>

<main class="relative z-10 flex flex-col items-center min-h-screen w-full px-6 py-12 max-w-[390px] mx-auto">
    <header class="w-full flex flex-col items-center gap-2 mt-8">
        <div class="w-16 h-16 rounded-full bg-white flex items-center justify-center shadow-xl mb-4">
            <svg height="32" viewbox="0 0 24 24" width="32"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path></svg>
        </div>
        <h1 class="font-headline text-3xl font-extrabold text-white">SkyCast</h1>
        <p class="text-white/80 text-sm font-medium">Choose an account</p>
    </header>

    <section class="w-full mt-8">
        <div id="accountList" class="glass-surface rounded-xl p-2 flex flex-col gap-1 shadow-xl">
            <!-- Accounts will be injected here -->
            <p class="text-center p-4 text-xs text-on-surface-variant">Searching for accounts...</p>
        </div>
    </section>

    <footer class="w-full mt-auto flex flex-col gap-4">
        <button onclick="Android.onGoBackToLogin()" class="text-xs text-white/60 font-medium hover:text-white">Cancel</button>
    </footer>
</main>

<script>
    function displayAccounts(accounts) {
        const container = document.getElementById('accountList');
        if (!accounts || accounts.length === 0) {
            container.innerHTML = '<p class="text-center p-4 text-xs text-on-surface-variant">No Google accounts found on this device.</p>';
            return;
        }

        container.innerHTML = "";
        accounts.forEach(acc => {
            const btn = document.createElement('button');
            btn.className = "w-full flex items-center gap-4 p-4 rounded-xl hover:bg-white/40 transition-colors text-left";
            btn.onclick = () => Android.onAccountSelected(acc.email);

            btn.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold">
                    ${acc.email[0].toUpperCase()}
                </div>
                <div class="flex-1">
                    <p class="font-semibold text-on-surface text-sm">${acc.email}</p>
                    <p class="text-xs text-on-surface-variant">Google Account</p>
                </div>
            `;
            container.appendChild(btn);
        });
    }
</script>
</body></html>
