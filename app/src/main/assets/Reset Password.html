<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SkyCast - Reset Password</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                  "tertiary-fixed": "#ffddb8",
                  "secondary": "#5654a8",
                  "on-tertiary-fixed": "#2a1700",
                  "on-secondary-container": "#393689",
                  "on-background": "#191c1e",
                  "surface-container-lowest": "#ffffff",
                  "on-tertiary-fixed-variant": "#653e00",
                  "inverse-on-surface": "#eff1f3",
                  "on-primary-fixed": "#001e2f",
                  "on-primary-container": "#003751",
                  "primary-container": "#0ea5e9",
                  "surface-variant": "#e0e3e5",
                  "on-tertiary": "#ffffff",
                  "background": "#f7f9fb",
                  "surface-container": "#eceef0",
                  "on-error-container": "#93000a",
                  "primary": "#006591",
                  "outline": "#6e7881",
                  "on-surface-variant": "#3e4850",
                  "secondary-container": "#a7a5ff",
                  "on-secondary": "#ffffff",
                  "error-container": "#ffdad6",
                  "surface-bright": "#f7f9fb",
                  "on-secondary-fixed-variant": "#3e3c8f",
                  "surface-dim": "#d8dadc",
                  "on-error": "#ffffff",
                  "surface-container-highest": "#e0e3e5",
                  "primary-fixed-dim": "#89ceff",
                  "outline-variant": "#bec8d2",
                  "secondary-fixed": "#e2dfff",
                  "on-secondary-fixed": "#100563",
                  "inverse-surface": "#2d3133",
                  "inverse-primary": "#89ceff",
                  "on-tertiary-container": "#4a2c00",
                  "tertiary-fixed-dim": "#ffb95f",
                  "error": "#ba1a1a",
                  "surface": "#f7f9fb",
                  "on-primary-fixed-variant": "#004c6e",
                  "surface-tint": "#006591",
                  "tertiary-container": "#d88a00",
                  "tertiary": "#855300",
                  "surface-container-low": "#f2f4f6",
                  "primary-fixed": "#c9e6ff",
                  "on-surface": "#191c1e",
                  "on-primary": "#ffffff",
                  "surface-container-high": "#e6e8ea",
                  "secondary-fixed-dim": "#c3c0ff"
              },
              "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
              },
              "fontFamily": {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Inter"],
                  "label": ["Inter"]
              }
            },
          },
        }
    </script>
    <style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-morphism {
          background: rgba(255, 255, 255, 0.65);
          backdrop-filter: blur(24px);
          -webkit-backdrop-filter: blur(24px);
        }
        .atmospheric-gradient {
          background: linear-gradient(135deg, #f7f9fb 0%, #e0f2fe 50%, #c9e6ff 100%);
        }
    </style>
    <style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Navigation Shell (Suppressed Labels based on Task Context) -->
<header class="fixed top-0 w-full z-50 flex items-center px-6 h-16 bg-white/60 dark:bg-slate-900/60 backdrop-blur-2xl shadow-2xl shadow-sky-500/5">
    <div class="flex items-center w-full max-w-7xl mx-auto justify-between">
        <div class="flex items-center gap-4">
            <!-- ✅ Back button connected to Forgot Password -->
            <button onclick="Android.onForgotPassword()" class="text-sky-600 dark:text-sky-400 active:scale-95 duration-200 ease-out p-2 rounded-full hover:bg-sky-50/50">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <span class="text-2xl font-extrabold bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent font-['Plus_Jakarta_Sans'] tracking-tight">SkyCast</span>
        </div>
    </div>
</header>
<!-- Main Canvas -->
<main class="flex-grow atmospheric-gradient flex items-center justify-center px-4 pt-24 pb-12">
    <div class="w-full max-w-md">
        <!-- Hero Content -->
        <div class="mb-10 text-center">
            <h1 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight mb-3">New Skies</h1>
            <p class="text-on-surface-variant font-medium opacity-80">Secure your account with a fresh password.</p>
        </div>
        <!-- Reset Password Card -->
        <div class="glass-morphism rounded-[2rem] p-8 shadow-2xl shadow-primary/5 relative overflow-hidden">
            <!-- Decorative element -->
            <div class="absolute -top-12 -right-12 w-32 h-32 bg-primary-container/20 rounded-full blur-3xl"></div>
            <div class="space-y-6 relative z-10">
                <!-- New Password Input -->
                <div class="space-y-2">
                    <label class="block text-[11px] font-semibold uppercase tracking-widest text-slate-500 pl-4" for="password">New Password</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
                        </div>
                        <input class="w-full pl-12 pr-4 py-4 bg-surface-container-high/40 border-0 rounded-full focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-slate-300" id="password" placeholder="••••••••" type="password"/>
                    </div>
                </div>
                <!-- Confirm Password Input -->
                <div class="space-y-2">
                    <label class="block text-[11px] font-semibold uppercase tracking-widest text-slate-500 pl-4" for="confirm-password">Confirm Password</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors" data-icon="verified_user">verified_user</span>
                        </div>
                        <input class="w-full pl-12 pr-4 py-4 bg-surface-container-high/40 border-0 rounded-full focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-slate-300" id="confirm-password" placeholder="••••••••" type="password"/>
                    </div>
                </div>
                <!-- Guidelines -->
                <div class="bg-surface-container-low/50 rounded-xl p-4 space-y-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Password Security</p>
                    <div class="flex items-center gap-2 text-xs text-on-surface-variant">
                        <span class="material-symbols-outlined text-[16px] text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        <span>At least 8 characters</span>
                    </div>
                </div>
                <!-- Submit Button -->
                <button onclick="Android.onResetPasswordClicked(document.getElementById('password').value, document.getElementById('confirm-password').value)" class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold rounded-full shadow-lg shadow-primary/25 hover:translate-y-[-2px] active:scale-95 transition-all">
                    Reset Password
                </button>
            </div>
            <div class="mt-8 text-center">
                <a onclick="Android.onGoBackToLogin()" class="text-sm font-semibold text-primary hover:text-primary-container transition-colors inline-flex items-center gap-1" href="javascript:void(0)">
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
                    Back to Login
                </a>
            </div>
        </div>
        <!-- Footer Message -->
        <div class="mt-12 text-center">
            <p class="text-xs text-slate-400 max-w-[280px] mx-auto leading-relaxed">
                Changing your password will sign you out of all other active sessions for security.
            </p>
        </div>
    </div>
</main>
<!-- Visual Accent Element -->
<div class="fixed bottom-0 left-0 w-full h-[353px] pointer-events-none -z-10">
    <img class="w-full h-full object-cover opacity-20 mask-gradient" data-alt="Soft ethereal background of high altitude wispy clouds with gentle pastel blue and white gradients" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB-jPJwfPbP6TV66iL2ekRuizkL9QPq0sUiPnuJmDt08iqkfNrC8bQtxVgSCn5kxufvdY38XdXPYJcR1TJ8DOzDlS9p9RgAJqAHHUKaiSH665cvqNzNbNF8lOWiL5ftCx2ZRECl4bSE_OdMqYtUcSZsb6DSRxEFlQxzyURgF633vvy5zPY0l71xrseuZ9hvbYAXv26lSi8hzrGL5AD_mzUNHauP9pTH6VKez0_aJvneryXg2R2nnOsSk2gl8rYhBQXkfyFhc0Md8FA1"/>
    <style>
        .mask-gradient {
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
        }
    </style>
</div>
</body></html>
