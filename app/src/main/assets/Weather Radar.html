<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SkyCast - Interactive Radar</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

    <!-- Leaflet Maps API -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#006591",
                "primary-container": "#0ea5e9",
                "background": "#f7f9fb",
                "surface": "#f7f9fb",
                "on-surface": "#191c1e",
                "outline": "#6e7881"
              }
            },
          },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        #map {
            height: 100vh;
            width: 100%;
            z-index: 0;
        }
        .glass-panel {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.75);
        }
        .leaflet-control-zoom {
            border: none !important;
            margin-top: 90px !important; /* Zoom buttons stay near top (below header) */
        }
        .leaflet-bar a {
            background-color: white !important;
            color: #006591 !important;
            border-bottom: 1px solid #f0f0f0 !important;
        }
    </style>
</head>
<body class="bg-background font-body text-on-background min-h-screen overflow-hidden">

<header class="fixed top-0 w-full z-[1000] bg-white/60 backdrop-blur-xl border-b border-white/20">
    <div class="flex justify-between items-center px-6 py-4">
        <div class="flex items-center gap-4">
            <button onclick="Android.onBackToDashboard()" class="text-primary p-2 hover:bg-sky-50 rounded-full transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <span id="headerTitle" class="text-xl font-extrabold text-primary font-headline tracking-tight">Weather Radar</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="Android.useCurrentLocation()" class="p-2.5 rounded-full bg-primary text-white shadow-lg shadow-primary/20 active:scale-95 transition-all">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
            </button>
        </div>
    </div>
</header>

<div id="map"></div>

<!-- Legend: Moved down to avoid overlap with Zoom buttons -->
<div class="fixed top-48 left-6 z-[999] flex flex-col gap-4">
    <div class="glass-panel p-4 rounded-2xl shadow-xl border border-white/30 flex flex-col gap-3 w-36">
        <span class="text-[10px] font-bold uppercase tracking-widest text-outline">Precipitation</span>
        <div class="flex flex-col gap-2">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-[#8fb2ff]"></div>
                <span class="text-xs font-medium">Light</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-[#0000ff]"></div>
                <span class="text-xs font-medium">Moderate</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-[#ff0000]"></div>
                <span class="text-xs font-medium">Heavy</span>
            </div>
        </div>
    </div>
</div>

<div class="fixed bottom-32 left-1/2 -translate-x-1/2 w-[90%] max-w-lg z-[999] glass-panel p-5 rounded-[2.5rem] shadow-2xl border border-white/40">
    <div class="flex flex-col gap-4">
        <div class="flex items-center justify-between px-2">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span id="radarStatus" class="text-sm font-bold font-headline text-on-surface">Live Radar Layer</span>
            </div>
            <span id="currentTime" class="text-xs font-mono font-bold text-primary">--:--</span>
        </div>
        <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">search</span>
            <input id="cityInput" onkeypress="if(event.key === 'Enter') handleSearch()"
                   class="w-full bg-white/50 border-none rounded-full py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary/20 transition-all outline-none"
                   placeholder="Search city on map..." type="text"/>
        </div>
    </div>
</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-3 pb-8 bg-white/70 backdrop-blur-2xl rounded-t-[2rem] z-[1000] shadow-[0_-8px_40px_rgba(0,101,145,0.1)]">
    <a onclick="Android.onBackToDashboard()" class="flex flex-col items-center justify-center text-slate-400 px-5 py-2.5 hover:text-primary transition-colors" href="javascript:void(0)">
        <span class="material-symbols-outlined mb-1">home</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
    </a>
    <a onclick="Android.onForecastClicked()" class="flex flex-col items-center justify-center text-slate-400 px-5 py-2.5 hover:text-primary transition-colors" href="javascript:void(0)">
        <span class="material-symbols-outlined mb-1">cloud_queue</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Forecast</span>
    </a>
    <div class="flex flex-col items-center justify-center bg-sky-100 text-sky-700 rounded-[1.25rem] px-5 py-2.5 transition-all scale-110 active:scale-95 shadow-sm">
        <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">radar</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Radar</span>
    </div>
    <a onclick="Android.onSettingsClicked()" class="flex flex-col items-center justify-center text-slate-400 px-5 py-2.5 hover:text-primary transition-colors" href="javascript:void(0)">
        <span class="material-symbols-outlined mb-1">settings</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Settings</span>
    </a>
</nav>

<script>
    let map;
    let marker;
    const apiKey = '71a582482e907b14addcc6da6b6578df';

    function initMap(lat = 6.9271, lon = 79.8612) {
        if (map) {
            map.setView([lat, lon], 12);
            if (marker) marker.setLatLng([lat, lon]);
            return;
        }

        map = L.map('map', {
            zoomControl: true,
            attributionControl: false
        }).setView([lat, lon], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        L.tileLayer(`https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${apiKey}`, {
            opacity: 0.6
        }).addTo(map);

        marker = L.marker([lat, lon]).addTo(map);
    }

    function handleSearch() {
        const city = document.getElementById('cityInput').value;
        if (city && typeof Android !== 'undefined') {
            Android.searchCity(city);
        }
    }

    function updateWeather(data) {
        document.getElementById('headerTitle').innerText = data.city;
        document.getElementById('radarStatus').innerText = 'Radar: ' + data.city;

        const now = new Date();
        document.getElementById('currentTime').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

        if (data.lat && data.lon) {
            initMap(data.lat, data.lon);
        }
    }

    window.onload = function() {
        initMap();
        if (typeof Android !== 'undefined') {
            Android.requestLocationPermission();
        }
    };

    setInterval(() => {
        const now = new Date();
        const timeEl = document.getElementById('currentTime');
        if (timeEl) timeEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    }, 1000);
</script>
</body>
</html>
