<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SkyCast - Password Updated</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#006591", "on-surface": "#191c1e", "on-surface-variant": "#3e4850", "surface": "#f7f9fb"
                    },
                    "fontFamily": { "headline": ["Plus Jakarta Sans"], "display": ["Plus Jakarta Sans"], "body": ["Inter"] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; }
        .ethereal-gradient { background: linear-gradient(135deg, #f7f9fb 0%, #e0f2fe 50%, #f1f5f9 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        body { min-height: 100vh; margin: 0; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<main class="relative h-[847px] w-[390px] mx-auto ethereal-gradient shadow-2xl overflow-hidden flex flex-col items-center justify-center px-8">
    <div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container/20 rounded-full blur-[80px]"></div>
    <div class="absolute top-1/2 -left-32 w-80 h-80 bg-secondary-container/10 rounded-full blur-[100px]"></div>

    <div class="relative z-10 w-full flex flex-col items-center">
        <div class="relative mb-12">
            <div class="absolute inset-0 bg-primary-container/30 rounded-full blur-3xl scale-150"></div>
            <div class="relative w-32 h-32 glass-card rounded-full flex items-center justify-center shadow-xl ring-1 ring-white/40">
                <span class="material-symbols-outlined text-6xl text-primary" style="font-variation-settings: 'wght' 300;">verified_user</span>
            </div>
        </div>

        <div class="text-center space-y-4 max-w-[320px]">
            <h1 class="font-display font-extrabold text-3xl text-on-surface tracking-tight leading-tight">Password Updated Successfully</h1>
            <p class="font-body text-on-surface-variant text-base leading-relaxed opacity-80">Your account is now secure. You can continue managing your profile.</p>
        </div>

        <div class="mt-16 w-full px-4">
            <button onclick="Android.onProfileManagementClicked()" class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-bold py-4 px-6 rounded-full shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                Back to Profile
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
            </button>
        </div>
    </div>
</main>
</body></html>
