<!DOCTYPE html>

<html lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SkyCast - Create Account</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#d8dadc",
                        "on-tertiary-fixed": "#2a1700",
                        "secondary": "#5654a8",
                        "on-primary": "#ffffff",
                        "outline-variant": "#bec8d2",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#100563",
                        "on-primary-fixed": "#001e2f",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#e2dfff",
                        "surface-bright": "#f7f9fb",
                        "on-background": "#191c1e",
                        "surface-variant": "#e0e3e5",
                        "surface-tint": "#006591",
                        "outline": "#6e7881",
                        "primary-container": "#0ea5e9",
                        "on-primary-container": "#003751",
                        "primary-fixed-dim": "#89ceff",
                        "on-surface-variant": "#3e4850",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-fixed-variant": "#653e00",
                        "primary": "#006591",
                        "tertiary-fixed-dim": "#ffb95f",
                        "secondary-fixed-dim": "#c3c0ff",
                        "on-secondary-fixed-variant": "#3e3c8f",
                        "tertiary-fixed": "#ffddb8",
                        "surface-container-high": "#e6e8ea",
                        "background": "#f7f9fb",
                        "tertiary-container": "#d88a00",
                        "on-primary-fixed-variant": "#004c6e",
                        "inverse-primary": "#89ceff",
                        "inverse-surface": "#2d3133",
                        "surface": "#f7f9fb",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-container": "#a7a5ff",
                        "on-tertiary-container": "#4a2c00",
                        "on-secondary": "#ffffff",
                        "tertiary": "#855300",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#c9e6ff",
                        "on-surface": "#191c1e",
                        "on-error": "#ffffff",
                        "surface-container": "#eceef0",
                        "on-secondary-container": "#393689",
                        "inverse-on-surface": "#eff1f3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .editorial-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
    <style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen relative overflow-hidden flex flex-col">
<!-- Atmospheric Background Layers -->
<div class="fixed inset-0 z-[-1]">
    <div class="absolute inset-0 bg-gradient-to-br from-primary via-primary-container to-secondary opacity-20"></div>
    <div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-tertiary-fixed-dim blur-[120px] opacity-30"></div>
    <div class="absolute bottom-[-5%] left-[-5%] w-[50%] h-[50%] rounded-full bg-secondary-container blur-[100px] opacity-20"></div>
    <img class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-40" data-alt="Dreamy wide shot of a sunset sky with soft violet and golden clouds, atmospheric ethereal feel" src="https://lh3.googleusercontent.com/aida-public/AB6AXuACXdz8SqxUFOhX6AegRlXSnX3a0IC4zifg9n7zbPqPeUDXzojci-H1kltJJpI-cjBfz2_dpOpuVJhFM4yrTJzvqycraJG7FT-NwEOTpojxZf95wOob2Yli0SqwEo6nJqM8SIYiimhgP_Pzjgcb_SjwuB-ALB0UPP4SseBkeYcZo2UY86Qk5KLZE35_zeQTNUXb1fLoS-A0Qfi_GNrMDmaBrJpdCaTbEitBhWSr3dqM2dtV8fG9jVCb_nYZPWxLEJxNnpGG3KeAqMaz"/>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center px-6 h-16 bg-white/60 dark:bg-slate-900/60 backdrop-blur-2xl shadow-sm shadow-sky-500/5">
    <button onclick="Android.onGoBackToLogin()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-sky-50/50 transition-colors group">
        <span class="material-symbols-outlined text-sky-600">arrow_back</span>
    </button>
    <div class="flex-1 flex justify-center">
        <h1 class="text-2xl font-extrabold bg-gradient-to-r from-sky-600 to-indigo-500 bg-clip-text text-transparent editorial-text tracking-tight">SkyCast</h1>
    </div>
    <div class="w-10"></div> <!-- Balance for centering -->
</header>
<main class="flex-1 flex items-center justify-center p-6 mt-16 pb-12">
    <div class="w-full max-w-md">
        <!-- Hero Heading Section -->
        <div class="mb-10 text-center md:text-left">
            <h2 class="editorial-text text-4xl font-extrabold tracking-tight text-on-surface mb-3 leading-tight">
                Create Account
            </h2>
            <p class="text-on-surface-variant text-base font-medium opacity-80">
                Join the community of sky watchers and explorers.
            </p>
        </div>
        <!-- Glass Registration Card -->
        <div class="glass-card rounded-[2rem] p-8 shadow-[0_20px_50px_rgba(14,165,233,0.1)] border border-white/40">
            <div class="space-y-6">
                <!-- Name Input -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-on-surface-variant ml-2" for="name">Full Name</label>
                    <div class="relative flex items-center group">
                        <span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">person</span>
                        <input class="w-full pl-12 pr-4 py-4 bg-surface-container-high rounded-full border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" id="name" placeholder="Your Name" type="text"/>
                    </div>
                </div>
                <!-- Email Input -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-on-surface-variant ml-2" for="email">Email Address</label>
                    <div class="relative flex items-center group">
                        <span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">mail</span>
                        <input class="w-full pl-12 pr-4 py-4 bg-surface-container-high rounded-full border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" id="email" placeholder="name@example.com" type="email"/>
                    </div>
                </div>
                <!-- Password Input -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-on-surface-variant ml-2" for="password">Password</label>
                    <div class="relative flex items-center group">
                        <span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">lock</span>
                        <input class="w-full pl-12 pr-12 py-4 bg-surface-container-high rounded-full border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
                        <button class="absolute right-4 text-outline hover:text-on-surface transition-colors" type="button">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                    <p class="text-[11px] text-outline px-4">Must be at least 8 characters long.</p>
                </div>
                <!-- Register Button -->
                <div class="pt-2">
                    <!-- ✅ Register Button → Kotlin function call කරනවා with values -->
                    <button onclick="Android.onRegisterClicked(document.getElementById('name').value, document.getElementById('email').value, document.getElementById('password').value)" class="flex items-center justify-center w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-full shadow-lg shadow-primary/25 hover:shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all editorial-text text-lg">
                        Register
                    </button>
                </div>
            </div>
            <!-- Divider Alternative: Whitespace & Subtle Text -->
            <div class="mt-8 text-center">
                <p class="text-on-surface-variant font-medium text-sm">
                    Already have an account?
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="javascript:void(0)" onclick="Android.onGoBackToLogin()">Sign In</a>
                </p>
            </div>
        </div>
        <!-- Footer / Terms -->
        <div class="mt-8 text-center px-4">
            <p class="text-[11px] text-outline leading-relaxed">
                By registering, you agree to our
                <span class="text-on-surface-variant font-semibold">Terms of Service</span> and
                <span class="text-on-surface-variant font-semibold">Privacy Policy</span>.
            </p>
        </div>
    </div>
</main>
<!-- Navigation suppressed for transactional screen per mandate -->
</body></html>
