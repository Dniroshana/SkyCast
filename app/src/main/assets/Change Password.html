<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#006591", "on-surface": "#191c1e", "on-surface-variant": "#3e4850", "surface": "#f7f9fb"
                    },
                    "fontFamily": { "headline": ["Plus Jakarta Sans"], "display": ["Plus Jakarta Sans"], "body": ["Inter"] }
                },
            },
        }
    </script>
    <style>
        body { margin: 0 auto; overflow: hidden; background-color: #f7f9fb; min-height: 100vh; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        .bg-sky-gradient { background: linear-gradient(180deg, #006591 0%, #0ea5e9 100%); }
    </style>
</head>
<body class="font-body text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/60 backdrop-blur-2xl flex items-center px-6 h-16">
    <div class="flex items-center gap-4">
        <button onclick="Android.onProfileManagementClicked()" class="text-sky-600 hover:opacity-80 transition-opacity active:scale-95">
            <span class="material-symbols-outlined" style="font-size: 28px;">arrow_back</span>
        </button>
        <h1 class="font-bold text-xl tracking-tight text-on-surface">Change Password</h1>
    </div>
</header>

<main class="relative z-10 pt-24 px-6 h-full flex flex-col max-w-lg mx-auto">
    <div class="mb-10">
        <h2 class="font-display font-extrabold text-3xl text-primary leading-tight">Security Update</h2>
        <p class="font-body text-on-surface-variant text-sm mt-2">Ensure your account remains secure by choosing a strong password.</p>
    </div>

    <!-- Error Message Display -->
    <div id="errorBox" class="hidden mb-6 p-4 bg-red-50 border border-red-100 rounded-xl flex items-center gap-3 animate-pulse">
        <span class="material-symbols-outlined text-red-500">error</span>
        <p id="errorMsg" class="text-xs font-bold text-red-600 uppercase tracking-wide"></p>
    </div>

    <div class="space-y-6">
        <div class="space-y-2">
            <label class="text-[13px] font-semibold text-on-surface ml-1 uppercase tracking-wider opacity-60">Current Password</label>
            <input id="currentPass" class="w-full h-14 px-5 glass-card border-none rounded-xl focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="••••••••" type="password"/>
        </div>
        <div class="space-y-2">
            <label class="text-[13px] font-semibold text-on-surface ml-1 uppercase tracking-wider opacity-60">New Password</label>
            <input id="newPass" class="w-full h-14 px-5 glass-card border-none rounded-xl focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="••••••••" type="password"/>
        </div>
        <div class="space-y-2">
            <label class="text-[13px] font-semibold text-on-surface ml-1 uppercase tracking-wider opacity-60">Confirm New Password</label>
            <input id="confirmPass" class="w-full h-14 px-5 glass-card border-none rounded-xl focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="••••••••" type="password"/>
        </div>
    </div>

    <div class="mt-12">
        <button onclick="validateAndSubmit()" class="w-full h-14 bg-sky-gradient text-white font-bold rounded-full shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">
            Update Password
        </button>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-3 pb-8 bg-white/70 backdrop-blur-3xl rounded-t-[2rem] z-50">
    <a onclick="Android.onBackToDashboard()" class="flex flex-col items-center justify-center text-slate-400 px-5 py-2.5">
        <span class="material-symbols-outlined mb-1">home</span>
        <span class="text-[10px] font-bold uppercase">Home</span>
    </a>
    <a onclick="Android.onForecastClicked()" class="flex flex-col items-center justify-center text-slate-400 px-5 py-2.5">
        <span class="material-symbols-outlined mb-1">cloud_queue</span>
        <span class="text-[10px] font-bold uppercase">Forecast</span>
    </a>
    <a onclick="Android.onRadarClicked()" class="flex flex-col items-center justify-center text-slate-400 px-5 py-2.5">
        <span class="material-symbols-outlined mb-1">radar</span>
        <span class="text-[10px] font-bold uppercase">Radar</span>
    </a>
    <div class="flex flex-col items-center justify-center bg-sky-100 text-sky-700 rounded-2xl px-6 py-2.5 shadow-sm">
        <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">person</span>
        <span class="text-[10px] font-bold uppercase">Profile</span>
    </div>
</nav>

<script>
    function validateAndSubmit() {
        const current = document.getElementById('currentPass').value;
        const newPass = document.getElementById('newPass').value;
        const confirm = document.getElementById('confirmPass').value;
        const errorBox = document.getElementById('errorBox');
        const errorMsg = document.getElementById('errorMsg');

        // Reset error state
        errorBox.classList.add('hidden');

        if (!current || !newPass || !confirm) {
            showError("Please fill all fields");
            return;
        }

        if (newPass.length < 6) {
            showError("Password must be at least 6 characters");
            return;
        }

        if (newPass !== confirm) {
            showError("Passwords do not match");
            return;
        }

        // Redirect to success page via Kotlin
        if (typeof Android !== 'undefined') {
            Android.onPasswordUpdated();
        }
    }

    function showError(msg) {
        const errorBox = document.getElementById('errorBox');
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.innerText = msg;
        errorBox.classList.remove('hidden');
    }
</script>
</body></html>
