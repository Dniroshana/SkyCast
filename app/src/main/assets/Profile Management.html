<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#006591",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#3e4850",
                        "surface": "#f7f9fb",
                        "error": "#ba1a1a"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        body { margin: 0 auto; overflow-x: hidden; background: linear-gradient(180deg, #c9e6ff 0%, #f7f9fb 100%); min-height: 100vh; }
    </style>
</head>
<body class="font-body text-on-surface">
<!-- TopAppBar -->
<nav class="flex items-center w-full px-6 py-4 fixed top-0 z-50 bg-transparent">
    <button onclick="Android.onSettingsClicked()" class="flex items-center justify-center p-2 rounded-full hover:bg-white/20 transition-all active:scale-95 duration-150">
        <span class="material-symbols-outlined text-sky-600">arrow_back</span>
    </button>
    <h1 class="ml-4 font-bold text-lg text-sky-900">Account</h1>
</nav>

<main class="pt-20 pb-32 px-6 space-y-8 max-w-lg mx-auto">
    <!-- User Profile Section -->
    <section class="flex flex-col items-center">
        <div class="relative group">
            <div class="w-32 h-32 rounded-full overflow-hidden shadow-2xl bg-white border-4 border-white">
                <img id="profileImage" alt="Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBFP8QiEy_ullS0NLztxnHE3vxPrK7XXbfOT_676Mb6wleL9OaFGzNuzTTCp2dhgBv3A83mQT9tPZUUbU78bTQPeHPeu41XXt_0fsxMBFMkwEqGtO_bTeWgdEB2G1UNwPlOWaJxwoG4hMKZdhXwQdKvZBqhykrLxhMohFuouZLvKOgOI2Sa7EPBXSjjsm3WcehJ02blUytecTTmizVUchLTsIoJ9YMWfjhC9S50HV2eBp-uscfRkXa3T9EBN5nace30i2gNyiJ5Ddu2"/>
            </div>
        </div>
        <div class="mt-6 text-center">
            <h2 id="profileName" class="text-3xl font-display font-extrabold tracking-tight text-on-surface truncate px-4">Loading...</h2>
            <p id="profileEmail" class="text-on-surface-variant font-medium mt-1 truncate">Please sign in</p>
        </div>
    </section>

    <!-- Subscription Card -->
    <section class="glass-card rounded-xl p-6 shadow-sm ring-1 ring-white/20">
        <div class="flex justify-between items-start">
            <div>
                <span class="text-xs font-bold uppercase tracking-widest text-primary mb-2 block">Current Plan</span>
                <h3 class="text-2xl font-display font-bold text-sky-900">Aetherial Pro</h3>
            </div>
            <div class="bg-sky-100 p-2 rounded-lg">
                <span class="material-symbols-outlined text-primary">diamond</span>
            </div>
        </div>
    </section>

    <!-- Security Section -->
    <section class="space-y-4">
        <h4 class="px-2 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70">Security</h4>
        <div class="glass-card rounded-xl overflow-hidden divide-y divide-on-surface/5">
            <!-- Change Password Button -->
            <button onclick="Android.onChangePasswordClicked()" class="w-full flex items-center justify-between p-5 hover:bg-white/40 transition-colors group text-left">
                <div class="flex items-center space-x-4">
                    <span class="material-symbols-outlined text-on-surface-variant">lock</span>
                    <span class="font-medium text-on-surface">Change Password</span>
                </div>
                <span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
            </button>
            <button class="w-full flex items-center justify-between p-5 hover:bg-white/40 transition-colors group text-left">
                <div class="flex items-center space-x-4">
                    <span class="material-symbols-outlined text-on-surface-variant">verified_user</span>
                    <div class="text-left">
                        <span class="font-medium text-on-surface block text-sm">Authentication Status</span>
                        <span class="text-xs text-primary font-bold">Verified Google User</span>
                    </div>
                </div>
                <span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
            </button>
        </div>
    </section>

    <!-- Danger Zone -->
    <section class="space-y-4">
        <h4 class="px-2 text-xs font-bold uppercase tracking-widest text-error/70">Danger Zone</h4>
        <div class="glass-card rounded-xl overflow-hidden shadow-sm">
            <button onclick="Android.onDeleteAccountClicked()" class="w-full flex items-center space-x-4 p-5 hover:bg-red-50 transition-colors group text-left">
                <span class="material-symbols-outlined text-error">delete_forever</span>
                <span class="font-medium text-error">Delete Account</span>
            </button>
        </div>
    </section>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-3 pb-8 bg-white/70 backdrop-blur-3xl rounded-t-[2rem] z-50 shadow-2xl">
    <a onclick="Android.onBackToDashboard()" class="flex flex-col items-center justify-center text-slate-400 px-5 py-2.5 hover:text-sky-50 transition-colors" href="javascript:void(0)">
        <span class="material-symbols-outlined mb-1">home</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
    </a>
    <a onclick="Android.onForecastClicked()" class="flex flex-col items-center justify-center text-slate-400 px-5 py-2.5 hover:text-sky-50 transition-colors" href="javascript:void(0)">
        <span class="material-symbols-outlined mb-1">cloud_queue</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Forecast</span>
    </a>
    <a onclick="Android.onRadarClicked()" class="flex flex-col items-center justify-center text-slate-400 px-5 py-2.5 hover:text-sky-50 transition-colors" href="javascript:void(0)">
        <span class="material-symbols-outlined mb-1">radar</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Radar</span>
    </a>
    <a class="flex flex-col items-center justify-center bg-sky-100 text-sky-700 rounded-2xl px-6 py-2.5 shadow-sm active:scale-95" href="javascript:void(0)">
        <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">person</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Profile</span>
    </a>
</nav>

<script>
    function updateUserInfo(name, email) {
        if (name) document.getElementById('profileName').innerText = name;
        if (email) document.getElementById('profileEmail').innerText = email;
    }

    window.onload = function() {
        if (typeof Android !== 'undefined' && Android.requestUserInfo) {
            Android.requestUserInfo();
        }
    };
</script>
</body></html>
