<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>SkyCast - Forgot Password</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#006591", "primary-container": "#0ea5e9", "on-primary": "#ffffff",
                "surface": "#f7f9fb", "on-surface": "#191c1e", "on-surface-variant": "#3e4850",
                "outline": "#6e7881", "background": "#f7f9fb"
              },
              borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
              fontFamily: { headline: ["Plus Jakarta Sans", "sans-serif"], body: ["Inter", "sans-serif"] }
            }
          }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255,255,255,0.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen relative flex flex-col overflow-x-hidden">

<div class="fixed inset-0 z-[-1] bg-gradient-to-br from-sky-100 via-white to-indigo-50"></div>

<!-- Top Bar -->
<header class="flex items-center px-6 h-16 bg-white/40 backdrop-blur-md">
    <button onclick="Android.onGoBackToLogin()" class="p-2 -ml-2 rounded-full active:bg-black/5">
        <span class="material-symbols-outlined text-primary">arrow_back</span>
    </button>
    <h1 class="ml-4 font-headline font-bold text-xl text-primary">Forgot Password</h1>
</header>

<main class="flex-grow flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md">
        <div class="glass-panel p-8 rounded-[2.5rem] shadow-xl border border-white/40">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center p-4 bg-primary/10 rounded-3xl mb-4">
                    <span class="material-symbols-outlined text-4xl text-primary">lock_reset</span>
                </div>
                <h2 class="text-2xl font-headline font-bold mb-2">Reset Password</h2>
                <p class="text-on-surface-variant text-sm">Enter your email to receive reset instructions.</p>
            </div>

            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-sm font-semibold ml-2">Email Address</label>
                    <input id="emailInput" class="w-full bg-white/50 border-0 focus:ring-2 focus:ring-primary/20 rounded-full py-4 px-6" placeholder="name@example.com" type="email"/>
                </div>

                <!-- ✅ Grabs value and calls Kotlin -->
                <button onclick="Android.onSendResetLink(document.getElementById('emailInput').value)" class="w-full bg-primary text-on-primary font-bold py-4 rounded-full shadow-lg active:scale-95 transition-all">
                    Send Reset Link
                </button>
            </div>
        </div>

        <div class="mt-8 text-center">
            <button onclick="Android.onGoBackToLogin()" class="text-primary font-bold hover:underline">
                Back to Login
            </button>
        </div>
    </div>
</main>

</body>
</html>
